<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dentalmovilr4 Market</title>
    <style>
        body { background-color: #050a18; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .header { margin-bottom: 25px; }
        .nav-links { color: #94a3b8; font-size: 0.8em; margin-bottom: 20px; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 450px; margin: 0 auto; }
        .card { background: #0f172a; padding: 15px; border-radius: 18px; border: 1px solid #1e293b; text-align: left; }
        .card.active { border: 2px solid #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
        .card h3 { margin: 5px 0; font-size: 1.2em; }
        .change { color: #4ade80; font-size: 0.75em; }
        .btn-juego { background: #fbbf24; color: #000; text-decoration: none; padding: 15px; width: 100%; max-width: 450px; border-radius: 35px; font-weight: bold; margin: 25px auto; display: block; }
        .nft-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 30px; }
        .nft-item { background: #0f172a; border-radius: 20px; width: 90%; max-width: 400px; overflow: hidden; border: 1px solid #1e293b; text-align: left; }
        .nft-item img { width: 100%; height: 220px; object-fit: cover; }
        .nft-info { padding: 15px; }
        .price { color: #fbbf24; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Dentalmovilr4 Market</h1>
        <div class="nav-links">BTC • ETH • SOL • BNB • DMR4</div>
    </div>

    <div class="grid" id="market-grid"></div>

    <a href="juego.html" class="btn-juego">🐄 ¡Jugar Agro-Clicker DMR4!</a>

    <h2>🐄 Colección Elite: Terneros Tech</h2>
    <div class="nft-container">
        <div class="nft-item">
            <img src="img/terneros_002.jpg">
            <div class="nft-info"><strong>Génesis #001</strong><br><span class="price">0.5 SOL</span></div>
        </div>
        <div class="nft-item">
            <img src="img/terneros_003.jpg">
            <div class="nft-info"><strong>Génesis #002</strong><br><span class="price">0.6 SOL</span></div>
        </div>
        <div class="nft-item">
            <img src="img/GoArt_1776626431201.jpg">
            <div class="nft-info"><strong>Agro-IA #001</strong><br><span class="price">0.7 SOL</span></div>
        </div>
        <div class="nft-item">
            <img src="img/GoArt_1776626442317.jpg">
            <div class="nft-info"><strong>Agro-IA #002</strong><br><span class="price">0.8 SOL</span></div>
        </div>
        <div class="nft-item">
            <img src="img/GoArt_1776626459982.jpg">
            <div class="nft-info"><strong>Visionary #003</strong><br><span class="price">0.9 SOL</span></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://miproyectoreact-55e39-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        firebase.database().ref('mercado').on('value', (snap) => {
            const data = snap.val();
            const grid = document.getElementById('market-grid');
            if (!data) return;
            grid.innerHTML = '';
            ['btc', 'eth', 'sol', 'bnb', 'dmr4'].forEach(coin => {
                if(data[coin]) {
                    const isDmr = coin === 'dmr4';
                    const p = isDmr ? data[coin].precio.toFixed(6) : data[coin].precio.toLocaleString();
                    grid.innerHTML += `
                        <div class="card ${isDmr ? 'active' : ''}">
                            <small>${coin.toUpperCase()}</small>
                            <h3>$${p}</h3>
                            <div class="change">0% ▲</div>
                        </div>`;
                }
            });
        });
    </script>
</body>
</html>
