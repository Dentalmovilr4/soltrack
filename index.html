<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dentalmovilr4 - Market</title>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: #0f172a; padding: 15px; border-radius: 15px; border: 1px solid #1e293b; box-shadow: 0 4px 10px rgba(0,255,255,0.1); }
        .nft-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .nft-item { background: #1e293b; border-radius: 15px; width: 280px; text-align: left; overflow: hidden; border: 1px solid #334155; }
        .nft-item img { width: 100%; height: 200px; object-fit: cover; }
        .nft-info { padding: 15px; }
        .price { color: #fbbf24; font-weight: bold; font-size: 1.2em; }
        h1, h2 { color: #38bdf8; text-shadow: 0 0 10px rgba(56,189,248,0.5); }
    </style>
</head>
<body>
    <h1>🚀 Mercado en Vivo</h1>
    <div class="grid" id="market-grid">
        <div class="card"><small>SOL</small><h3>Cargando...</h3></div>
    </div>

    <h2>🐄 Colección Elite: Terneros Tech</h2>
    <div class="nft-container">
        <div class="nft-item">
            <img src="img/terneros_002.jpg">
            <div class="nft-info"><strong>Génesis #001</strong><br><small>+20% Producción</small><br><span class="price">0.5 SOL</span></div>
        </div>
        <div class="nft-item">
            <img src="img/terneros_003.jpg">
            <div class="nft-info"><strong>Génesis #002</strong><br><small>Rareza: Oro</small><br><span class="price">0.6 SOL</span></div>
        </div>
        <div class="nft-item">
            <img src="img/GoArt_1776626431201.jpg">
            <div class="nft-info"><strong>Agro-IA #001</strong><br><small>Bio-Tech v1</small><br><span class="price">0.7 SOL</span></div>
        </div>
        <div class="nft-item">
            <img src="img/GoArt_1776626442317.jpg">
            <div class="nft-info"><strong>Agro-IA #002</strong><br><small>Bio-Tech v2</small><br><span class="price">0.8 SOL</span></div>
        </div>
        <div class="nft-item">
            <img src="img/GoArt_1776626459982.jpg">
            <div class="nft-info"><strong>Visionary #003</strong><br><small>Edición Limitada</small><br><span class="price">0.9 SOL</span></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://miproyectoreact-55e39-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('mercado');

        dbRef.on('value', (snap) => {
            const data = snap.val();
            const grid = document.getElementById('market-grid');
            if (!data) return;
            grid.innerHTML = '';
            ['btc', 'eth', 'sol', 'bnb', 'dmr4'].forEach(coin => {
                if(data[coin]) {
                    grid.innerHTML += `<div class="card">
                        <small>${coin.toUpperCase()}</small>
                        <h3>$${data[coin].precio.toLocaleString()}</h3>
                    </div>`;
                }
            });
        });
    </script>
</body>
</html>
