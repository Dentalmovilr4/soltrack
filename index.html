<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dentalmovilr4 - Dashboard de Mercado</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #38bdf8; border-bottom: 2px solid #1e293b; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #0f172a; padding: 20px; border-radius: 15px; border: 1px solid #1e293b; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: #38bdf8; }
        .name { font-size: 0.9rem; color: #94a3b8; text-transform: uppercase; }
        .price { font-size: 1.8rem; font-weight: bold; margin: 10px 0; color: #f1f5f9; }
        .change { font-size: 1rem; font-weight: 500; }
        .dmr4-card { border: 2px solid #fbbf24; background: linear-gradient(145deg, #0f172a, #1e1b4b); }
    </style>
</head>
<body>
    <h1>🚀 Dentalmovilr4 Market Live</h1>
    <div class="grid" id="market-grid">
        <p>Conectando con la blockchain...</p>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://miproyectoreact-55e39-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('mercado');

        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';

            for (const coin in data) {
                const isDMR4 = coin === 'dmr4';
                const card = document.createElement('div');
                card.className = `card ${isDMR4 ? 'dmr4-card' : ''}`;
                
                const precio = typeof data[coin].precio === 'number' ? data[coin].precio.toLocaleString('en-US', { style: 'currency', currency: 'USD' }) : `$${data[coin].precio}`;
                const cambio = data[coin].cambio24h;
                const colorCambio = cambio >= 0 ? '#4ade80' : '#f87171';

                card.innerHTML = `
                    <div class="name">${isDMR4 ? '💎 ' + coin : coin}</div>
                    <div class="price">${precio}</div>
                    <div class="change" style="color: ${colorCambio}">${cambio}% (24h)</div>
                `;
                grid.appendChild(card);
            }
        });
    </script>
</body>
</html>
