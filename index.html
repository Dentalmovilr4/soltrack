<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dentalmovilr4 - Market & NFT</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .card { background: #0f172a; padding: 20px; border-radius: 15px; border: 1px solid #1e293b; margin-bottom: 10px; }
        .venta-section { background: #0f172a; border: 2px solid #38bdf8; border-radius: 20px; padding: 30px; margin-top: 50px; }
        .nft-item { width: 250px; background: #1e293b; border-radius: 15px; overflow: hidden; border: 1px solid #334155; margin: auto; }
        .nft-item img { width: 100%; height: 200px; object-fit: cover; }
        .btn-whatsapp { display: inline-block; background: #25d366; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; text-decoration: none; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>🚀 Dentalmovilr4 Market</h1>
    <div id="market-grid"></div>

    <div class="venta-section">
        <h2>🐄 Colección: Terneros Tech</h2>
        <div class="nft-item">
            <img src="img/terneros_001.jpg" alt="Terneros Tech">
            <div style="padding:15px;">
                <strong style="color: #fbbf24;">Génesis #001</strong>
                <p>Precio: Consultar</p>
            </div>
        </div>
        <a href="https://wa.me/573114275056?text=Hola,%20interesado%20en%20el%20NFT%20001" class="btn-whatsapp">
            📱 Contactar WhatsApp
        </a>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://miproyectoreact-55e39-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        firebase.database().ref('mercado').on('value', (snap) => {
            const data = snap.val();
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';
            for (const coin in data) {
                grid.innerHTML += `<div class="card"><strong>${coin.toUpperCase()}</strong>: $${data[coin].precio}</div>`;
            }
        });
    </script>
</body>
</html>
