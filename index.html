<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dentalmovilr4 - Market & NFT</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .header { border-bottom: 2px solid #1e293b; padding-bottom: 20px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: #0f172a; padding: 15px; border-radius: 15px; border: 1px solid #1e293b; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #38bdf8; }
        .dmr4-card { border: 2px solid #fbbf24; background: linear-gradient(145deg, #0f172a, #1e1b4b); box-shadow: 0 0 15px rgba(251, 191, 36, 0.2); }
        .btn-jugar { display: inline-block; background: #fbbf24; color: #020617; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; margin: 20px 0; font-size: 1.1rem; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }
        .venta-section { background: #0f172a; border: 2px solid #38bdf8; border-radius: 20px; padding: 25px; margin-top: 40px; }
        .nft-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .nft-item { width: 260px; background: #1e293b; border-radius: 15px; overflow: hidden; border: 1px solid #334155; text-align: left; }
        .nft-item img { width: 100%; height: 200px; object-fit: cover; }
        .price-tag { font-weight: bold; color: #fbbf24; font-size: 1.1rem; }
        .btn-whatsapp { display: inline-block; background: #25d366; color: white; padding: 12px 25px; border-radius: 50px; font-weight: bold; text-decoration: none; margin-top: 35px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Dentalmovilr4 Market</h1>
    </div>

    <div class="grid" id="market-grid"></div>

    <a href="juego.html" class="btn-jugar">🐄 ¡Jugar y Ganar DMR4!</a>

    <div class="venta-section">
        <h2>🐄 Colección Elite: Terneros Tech & Agro-Vision</h2>
        <div class="nft-grid">
            <div class="nft-item">
                <img src="img/terneros_002.jpg">
                <div style="padding:15px;">
                    <strong>Génesis #001</strong>
                    <p style="font-size:0.8rem; color:#94a3b8;">+20% Leche en Juego</p>
                    <div class="price-tag">0.5 SOL</div>
                </div>
            </div>
            <div class="nft-item">
                <img src="img/GoArt_1776626431201.jpg">
                <div style="padding:15px;">
                    <strong>Agro-IA #002</strong>
                    <p style="font-size:0.8rem; color:#94a3b8;">Eficiencia Bio-Tech</p>
                    <div class="price-tag">25,000 DMR4</div>
                </div>
            </div>
        </div>
        <a href="https://wa.me/573114275056?text=Hola%20Dentalmovilr4,%20quiero%20comprar%20un%20NFT%20Elite" class="btn-whatsapp">Comprar por WhatsApp</a>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://miproyectoreact-55e39-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('mercado');

        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';
            ['btc', 'eth', 'sol', 'bnb', 'dmr4'].forEach(coin => {
                if (data[coin]) {
                    const c = data[coin];
                    const isD = coin === 'dmr4';
                    grid.innerHTML += `<div class="card ${isD ? 'dmr4-card' : ''}">
                        <small>${coin.toUpperCase()}</small>
                        <h3>$${isD ? c.precio.toFixed(6) : c.precio.toLocaleString()}</h3>
                        <span style="color:${c.cambio24h >= 0 ? '#4ade80' : '#f87171'}">${c.cambio24h}%</span>
                    </div>`;
                }
            });
        });
    </script>
</body>
</html>
